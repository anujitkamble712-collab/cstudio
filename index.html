<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CStudio</title>

<style>
body{
    margin:0;
    background:#1e1e1e;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#0078d7;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

textarea{
    width:95%;
    height:300px;
    margin:20px auto;
    display:block;
    background:#252526;
    color:#00ff88;
    font-size:16px;
    border:none;
    padding:10px;
}

button{
    display:block;
    width:200px;
    margin:10px auto;
    padding:12px;
    font-size:18px;
}

pre{
    width:95%;
    margin:auto;
    background:black;
    color:lime;
    min-height:150px;
    padding:10px;
}
</style>

</head>

<body>

<header>CStudio Compiler</header>

<textarea id="code">
#include<stdio.h>

int main()
{
    printf("Hello World");
    return 0;
}
</textarea>

<button onclick="run()">Compile & Run</button>

<pre id="output">
Output will appear here...
</pre>

<script>
function run(){
document.getElementById("output").innerHTML=
"Compiler will be connected in the next step...";
}
</script>

</body>
</html>
